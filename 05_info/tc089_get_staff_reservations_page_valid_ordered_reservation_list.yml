info:
  name: TC090 - Get Staff Reservations Page - Valid Ordered Reservation List
  type: http
  seq: 4
  tags:
  - info
  - tc090
http:
  method: GET
  url: '{{baseUrl}}/staff/reservations'
  auth:
    type: bearer
    token: '{{staffToken}}'
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 200\", function() {\n  expect(res.status).to.equal(200);\n\
      });\ntest(\"body status is 200\", function() {\n  expect(res.body.status).to.equal(200);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      get successful\");\n});\ntest(\"data is an array\", function() {\n  expect(Array.isArray(res.body.data)).to.equal(true);\n\
      });\ntest(\"first data item has reservationId\", function() {\n  expect(res.body.data[0]).to.have.property(\"\
      reservationId\");\n});\ntest(\"first data item has customerName\", function()\
      \ {\n  expect(res.body.data[0]).to.have.property(\"customerName\");\n});\ntest(\"\
      first data item has date\", function() {\n  expect(res.body.data[0]).to.have.property(\"\
      date\");\n});\ntest(\"first data item has timeslot\", function() {\n  expect(res.body.data[0]).to.have.property(\"\
      timeslot\");\n});\ntest(\"first data item has numberOfGuests\", function() {\n\
      \  expect(res.body.data[0]).to.have.property(\"numberOfGuests\");\n});\ntest(\"\
      first data item has tableCode\", function() {\n  expect(res.body.data[0]).to.have.property(\"\
      tableCode\");\n});\ntest(\"first data item has status\", function() {\n  expect(res.body.data[0]).to.have.property(\"\
      status\");\n});\ntest(\"staff reservations are ordered today -> future -> past\"\
      , function() {\n  const arr = res.body.data || [];\n  const today = new Date();\
      \ today.setHours(0,0,0,0);\n  const bucket = (s) => { const d = new Date(s +\
      \ \"T00:00:00\"); d.setHours(0,0,0,0); if (d.getTime() === today.getTime())\
      \ return 0; return d > today ? 1 : 2; };\n  const buckets = arr.map(x => bucket(x.date));\n\
      \  const sorted = [...buckets].sort((a,b) => a-b);\n  expect(JSON.stringify(buckets)).to.equal(JSON.stringify(sorted));\n\
      });\ntest(\"note\", function() {\n  bru.setVar(\"lastTestNote\", \"valid  Expected\
      \ ordering rule: - today first - future dates next - past dates last\");\n \
      \ expect(true).to.equal(true);\n});"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
