info:
  name: TC093 - Get Performance Report - Valid Reservation Status Percentages And
    Peak Hours
  type: http
  seq: 7
  tags:
  - info
  - tc093
http:
  method: GET
  url: '{{baseUrl}}/reports/performance'
  auth:
    type: bearer
    token: '{{adminToken}}'
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 200\", function() {\n  expect(res.status).to.equal(200);\n\
      });\ntest(\"body status is 200\", function() {\n  expect(res.body.status).to.equal(200);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      get successful\");\n});\ntest(\"data object exists\", function() {\n  expect(res.body.data).to.exist;\n\
      });\ntest(\"data.reservationStatusPercent exists\", function() {\n  expect(res.body.data.reservationStatusPercent).to.exist;\n\
      });\ntest(\"data.peakHours is array\", function() {\n  expect(Array.isArray(res.body.data.peakHours)).to.equal(true);\n\
      });\ntest(\"reservation status percent object exists\", function() {\n  expect(res.body.data.reservationStatusPercent).to.exist;\n\
      });"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
