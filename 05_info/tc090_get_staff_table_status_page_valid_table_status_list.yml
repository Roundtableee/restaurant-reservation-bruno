info:
  name: TC090 - Get Staff Table Status Page - Valid Table Status List
  type: http
  seq: 5
  tags:
  - info
  - tc090
http:
  method: GET
  url: '{{baseUrl}}/staff/tables'
  auth:
    type: bearer
    token: '{{staffToken}}'
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 200\", function() {\n  expect(res.status).to.equal(200);\n\
      });\ntest(\"body status is 200\", function() {\n  expect(res.body.status).to.equal(200);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      get successful\");\n});\ntest(\"data is an array\", function() {\n  expect(Array.isArray(res.body.data)).to.equal(true);\n\
      });\ntest(\"first data item has tableCode\", function() {\n  expect(res.body.data[0]).to.have.property(\"\
      tableCode\");\n});\ntest(\"first data item has capacity\", function() {\n  expect(res.body.data[0]).to.have.property(\"\
      capacity\");\n});\ntest(\"first data item has status\", function() {\n  expect(res.body.data[0]).to.have.property(\"\
      status\");\n});\ntest(\"first data item has update\", function() {\n  expect(res.body.data[0]).to.have.property(\"\
      update\");\n});"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
