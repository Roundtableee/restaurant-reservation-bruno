info:
  name: TC088 - Get Staff Dashboard - Valid Summary Response
  type: http
  seq: 3
  tags:
  - info
  - tc088
http:
  method: GET
  url: '{{baseUrl}}/staff/dashboard'
  auth:
    type: bearer
    token: '{{staffToken}}'
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 200\", function() {\n  expect(res.status).to.equal(200);\n\
      });\ntest(\"body status is 200\", function() {\n  expect(res.body.status).to.equal(200);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      get successful\");\n});\ntest(\"data object exists\", function() {\n  expect(res.body.data).to.exist;\n\
      });\ntest(\"data has todayReservationCount\", function() {\n  expect(res.body.data).to.have.property(\"\
      todayReservationCount\");\n});\ntest(\"data has currentOccupiedTables\", function()\
      \ {\n  expect(res.body.data).to.have.property(\"currentOccupiedTables\");\n\
      });\ntest(\"data has currentAvailableTables\", function() {\n  expect(res.body.data).to.have.property(\"\
      currentAvailableTables\");\n});\ntest(\"data.recentNotifications is array\"\
      , function() {\n  expect(Array.isArray(res.body.data.recentNotifications)).to.equal(true);\n\
      });\ntest(\"recent notifications max 5\", function() {\n  expect(res.body.data.recentNotifications.length).to.be.at.most(5);\n\
      });"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
