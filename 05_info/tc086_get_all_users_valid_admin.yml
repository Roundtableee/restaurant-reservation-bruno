info:
  name: TC086 - Get All Users - Valid Admin
  type: http
  seq: 1
  tags:
  - info
  - tc086
http:
  method: GET
  url: '{{baseUrl}}/users'
  auth:
    type: bearer
    token: '{{adminToken}}'
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 200\", function() {\n  expect(res.status).to.equal(200);\n\
      });\ntest(\"body status is 200\", function() {\n  expect(res.body.status).to.equal(200);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      get successful\");\n});\ntest(\"data is an array\", function() {\n  expect(Array.isArray(res.body.data)).to.equal(true);\n\
      });\ntest(\"first data item has userId\", function() {\n  expect(res.body.data[0]).to.have.property(\"\
      userId\");\n});\ntest(\"first data item has role\", function() {\n  expect(res.body.data[0]).to.have.property(\"\
      role\");\n});\ntest(\"first data item has email\", function() {\n  expect(res.body.data[0]).to.have.property(\"\
      email\");\n});"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
