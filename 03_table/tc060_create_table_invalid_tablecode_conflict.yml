info:
  name: TC060 - Create Table - Invalid TableCode Conflict
  type: http
  seq: 6
  tags:
  - table
  - tc060
http:
  method: POST
  url: '{{baseUrl}}/table'
  body:
    type: json
    data: "{\n  \"TableCode\": \"{{manageTableCode}}\",\n  \"Capacity\": 5\n}"
  auth:
    type: bearer
    token: '{{adminToken}}'
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 409\", function() {\n  expect(res.status).to.equal(409);\n\
      });\ntest(\"body status is 409\", function() {\n  expect(res.body.status).to.equal(409);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      table code conflict\");\n});"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
