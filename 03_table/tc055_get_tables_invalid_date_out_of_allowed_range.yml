info:
  name: TC055 - Get Tables - Invalid Date Out Of Allowed Range
  type: http
  seq: 2
  tags:
  - table
  - tc055
http:
  method: GET
  url: '{{baseUrl}}/tables?date={{pastDate}}&timeslotStart=18:00&timeslotEnd=20:00&status=Available'
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 422\", function() {\n  expect(res.status).to.equal(422);\n\
      });\ntest(\"body status is 422\", function() {\n  expect(res.body.status).to.equal(422);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      date must be between tomorrow and 180 days after today\");\n});"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
