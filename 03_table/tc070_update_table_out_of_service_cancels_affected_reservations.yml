info:
  name: TC070 - Update Table - Out Of Service Cancels Affected Reservations
  type: http
  seq: 17
  tags:
  - table
  - tc070
http:
  method: PUT
  url: '{{baseUrl}}/table/{{oosTableId}}'
  body:
    type: json
    data: "{\n  \"tableId\": \"{{oosTableId}}\",\n  \"status\": \"Out of Service\"\
      \n}"
  auth:
    type: bearer
    token: '{{staffToken}}'
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 201\", function() {\n  expect(res.status).to.equal(201);\n\
      });\ntest(\"body status is 201\", function() {\n  expect(res.body.status).to.equal(201);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      update table successful\");\n});\ntest(\"tableId exists\", function() {\n  expect(res.body.tableId).to.exist;\n\
      });\ntest(\"tableStatus matches\", function() {\n  expect(res.body.tableStatus).to.equal(\"\
      Out of Service\");\n});\ntest(\"note\", function() {\n  bru.setVar(\"lastTestNote\"\
      , \"valid  Post-condition: - affected future reservations on this table are\
      \ updated to \\\"Cancelled\\\" - affected customer/staff accounts are notified\"\
      );\n  expect(true).to.equal(true);\n});"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
