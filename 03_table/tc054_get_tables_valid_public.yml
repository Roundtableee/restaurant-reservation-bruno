info:
  name: TC055 - Get Tables - Valid Public
  type: http
  seq: 1
  tags:
  - table
  - tc055
http:
  method: GET
  url: '{{baseUrl}}/tables?date={{futureDate2}}&timeslotStart=18:00&timeslotEnd=20:00&status=Available'
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 200\", function() {\n  expect(res.status).to.equal(200);\n\
      });\ntest(\"body status is 200\", function() {\n  expect(res.body.status).to.equal(200);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      get tables successful\");\n});\ntest(\"data is an array\", function() {\n  expect(Array.isArray(res.body.data)).to.equal(true);\n\
      });\ntest(\"first data item has tableId\", function() {\n  expect(res.body.data[0]).to.have.property(\"\
      tableId\");\n});\ntest(\"first data item has capacity\", function() {\n  expect(res.body.data[0]).to.have.property(\"\
      capacity\");\n});\ntest(\"first data item has status\", function() {\n  expect(res.body.data[0]).to.have.property(\"\
      status\");\n});"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
