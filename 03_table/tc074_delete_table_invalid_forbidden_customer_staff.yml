info:
  name: TC074 - Delete Table - Invalid Forbidden Customer/Staff
  type: http
  seq: 20
  tags:
  - table
  - tc074
http:
  method: DELETE
  url: '{{baseUrl}}/table/{{deleteTableId}}'
  auth:
    type: bearer
    token: '{{customerToken}}'
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 403\", function() {\n  expect(res.status).to.equal(403);\n\
      });\ntest(\"body status is 403\", function() {\n  expect(res.body.status).to.equal(403);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      forbidden\");\n});"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
