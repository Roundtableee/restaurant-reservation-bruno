info:
  name: TC033 - Create Reservation - Invalid Timeslot Missing
  type: http
  seq: 14
  tags:
  - reservation
  - tc033
http:
  method: POST
  url: '{{baseUrl}}/reservation'
  body:
    type: json
    data: "{\n  \"Date\": \"{{futureDate2}}\",\n  \"NumberOfGuests\": 4,\n  \"SpecialRequest\"\
      : \"Window seat\",\n  \"TableId\": \"{{largeTableId}}\"\n}"
  auth:
    type: bearer
    token: '{{customerToken}}'
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 422\", function() {\n  expect(res.status).to.equal(422);\n\
      });\ntest(\"body status is 422\", function() {\n  expect(res.body.status).to.equal(422);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      timeslot must be selected\");\n});"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
