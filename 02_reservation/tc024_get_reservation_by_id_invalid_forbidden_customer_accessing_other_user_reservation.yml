info:
  name: TC024 - Get Reservation By ID - Invalid Forbidden Customer Accessing Other
    User Reservation
  type: http
  seq: 5
  tags:
  - reservation
  - tc024
http:
  method: GET
  url: '{{baseUrl}}/reservation/{{customerReservationId}}'
  auth:
    type: bearer
    token: '{{otherCustomerToken}}'
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 403\", function() {\n  expect(res.status).to.equal(403);\n\
      });\ntest(\"body status is 403\", function() {\n  expect(res.body.status).to.equal(403);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      forbidden\");\n});"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
