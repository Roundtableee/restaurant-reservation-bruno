info:
  name: TC028 - Create Reservation - Invalid Table Not Found
  type: http
  seq: 10
  tags:
  - reservation
  - tc028
http:
  method: POST
  url: '{{baseUrl}}/reservation'
  body:
    type: json
    data: "{\n  \"Date\": \"{{futureDate2}}\",\n  \"Timeslot\": \"{{futureTimeslot}}\"\
      ,\n  \"NumberOfGuests\": 4,\n  \"SpecialRequest\": \"Window seat\",\n  \"TableId\"\
      : \"{{fakeTableId}}\"\n}"
  auth:
    type: bearer
    token: '{{customerToken}}'
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 404\", function() {\n  expect(res.status).to.equal(404);\n\
      });\ntest(\"body status is 404\", function() {\n  expect(res.body.status).to.equal(404);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      table not found\");\n});"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
