info:
  name: TC044 - Update Reservation - Valid Staff Walk-In
  type: http
  seq: 25
  tags:
  - reservation
  - tc044
http:
  method: PUT
  url: '{{baseUrl}}/reservation/{{walkInReservationId}}'
  body:
    type: json
    data: "{\n  \"Date\": \"{{walkInDate}}\",\n  \"Timeslot\": \"{{walkInUpdateTimeslot}}\"\
      ,\n  \"NumberOfGuests\": 5,\n  \"SpecialRequest\": \"Near counter\",\n  \"TableId\"\
      : \"{{walkInTableId}}\",\n  \"CustomerName\": \"Walk In Customer\",\n  \"Phone\"\
      : \"{{walkInPhone}}\"\n}"
  auth:
    type: bearer
    token: '{{staffToken}}'
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 200\", function() {\n  expect(res.status).to.equal(200);\n\
      });\ntest(\"body status is 200\", function() {\n  expect(res.body.status).to.equal(200);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      update reservation successful\");\n});\ntest(\"reservationId exists\", function()\
      \ {\n  expect(res.body.reservationId).to.exist;\n});\ntest(\"reservationStatus\
      \ matches\", function() {\n  expect(res.body.reservationStatus).to.equal(\"\
      Walk-in\");\n});"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
