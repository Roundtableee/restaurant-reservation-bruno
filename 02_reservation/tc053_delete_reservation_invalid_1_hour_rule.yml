info:
  name: TC053 - Delete Reservation - Invalid 1 Hour Rule
  type: http
  seq: 35
  tags:
  - reservation
  - tc053
http:
  method: DELETE
  url: '{{baseUrl}}/reservation/{{lateRuleReservationId}}'
  auth:
    type: bearer
    token: '{{customerToken}}'
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 422\", function() {\n  expect(res.status).to.equal(422);\n\
      });\ntest(\"body status is 422\", function() {\n  expect(res.body.status).to.equal(422);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      must be at least 1 hour before reservation time\");\n});"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
