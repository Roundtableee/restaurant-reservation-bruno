info:
  name: TC002 - Register - Invalid Weak Password
  type: http
  seq: 2
  tags:
  - auth
  - tc002
http:
  method: POST
  url: '{{baseUrl}}/auth/register'
  body:
    type: json
    data: "{\n  \"fullName\": \"{{customerFullName}}\",\n  \"password\": \"123\",\n\
      \  \"email\": \"{{customerEmail}}\",\n  \"phone\": \"{{customerPhone}}\"\n}"
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 409\", function() {\n  expect(res.status).to.equal(409);\n\
      });\ntest(\"body status is 409\", function() {\n  expect(res.body.status).to.equal(409);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      password requirement not met\");\n});"
settings:
