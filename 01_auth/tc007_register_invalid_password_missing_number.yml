info:
  name: TC008 - Register - Invalid Password Missing Number
  type: http
  seq: 8
  tags:
  - auth
  - tc008
http:
  method: POST
  url: '{{baseUrl}}/auth/register'
  body:
    type: json
    data: "{\n  \"fullName\": \"{{customerFullName}}\",\n  \"password\": \"HelloWorld\"\
      ,\n  \"email\": \"{{customerEmail}}\",\n  \"phone\": \"{{customerPhone}}\"\n\
      }"
runtime:
  scripts:
  - type: tests
    code: "test(\"HTTP status is 409\", function() {\n  expect(res.status).to.equal(409);\n\
      });\ntest(\"body status is 409\", function() {\n  expect(res.body.status).to.equal(409);\n\
      });\ntest(\"message matches\", function() {\n  expect(res.body.message).to.equal(\"\
      password must contain at least 1 number\");\n});"
settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
